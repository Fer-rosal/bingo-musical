appId: com.bingomusical.app
name: Android App Launch
tags:
  - android
  - smoke

---

# Smoke test: verify the app launches and the login screen renders
# with the Spotify connect button and status message visible.
#
# This test runs on the bingo_musical_avd emulator (API 33, google_apis, x86_64).
# No Spotify app is installed on this image — that case is tested in android-spotify-fallback.yaml.

- launchApp:
    appId: com.bingomusical.app
    clearState: true

- assertVisible:
    id: "spotify-connect-btn"
    timeout: 10000

- assertVisible:
    id: "spotify-connect-status"
    timeout: 5000

- takeScreenshot: "app-launch-success"
